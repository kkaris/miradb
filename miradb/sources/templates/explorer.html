<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epidemic Model Explorer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.15/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.15/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.15/dist/contrib/auto-render.min.js"></script>

    <style>
        /* ── Layout ── */
        html, body { height: 100%; overflow: hidden; }

        #sidebar {
            width: 240px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #fff;
            border-right: 1px solid #e5e7eb;
        }

        #main-area {
            flex: 1;
            overflow-y: auto;
            height: 100vh;
            padding: 1.25rem;
            background: #f3f4f6;
        }

        /* ── Sidebar list items ── */
        .sidebar-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.6rem 0.75rem;
            border: none;
            border-bottom: 1px solid #f1f5f9;
            background: transparent;
            cursor: pointer;
            transition: background 0.12s;
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover  { background: #eff6ff; }
        .sidebar-item.active { background: #eff6ff; border-left-color: #3b82f6; }

        /* ── Summary cards (grid) ── */
        .ep-summary-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: box-shadow 0.15s, border-color 0.15s;
            overflow: hidden;
        }
        .ep-summary-card:hover        { box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: #93c5fd; }
        .ep-summary-card.highlighted  { border-color: #3b82f6; box-shadow: 0 0 0 3px #bfdbfe; }

        /* ── Detail / ODE cards ── */
        .ode-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            overflow: hidden;
        }

        /* ── Grounding concepts panel ── */
        .gc-panel {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid #e5e7eb;
            overflow-y: auto;
            max-height: 340px;
            padding: 0.75rem;
            background: #fafafa;
        }
        .gc-var-row {
            padding: 0.4rem 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .gc-var-row:last-child { border-bottom: none; }
        .gc-var-name {
            font-size: .78rem;
            font-weight: 700;
            color: #1e3a5f;
            font-family: monospace;
        }
        .gc-ontology {
            font-size: .7rem;
            color: #6366f1;
            font-family: monospace;
            margin-left: 0.25rem;
        }
        .gc-context-row {
            font-size: .68rem;
            color: #6b7280;
            margin-top: 1px;
            padding-left: 0.5rem;
        }
        .gc-context-key   { color: #9ca3af; }
        .gc-context-value { color: #374151; }

        /* ── Equation box ── */
        .eq-box {
            background: #f9fafb;
            border: 1px solid #f1f5f9;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            overflow-y: auto;
            min-height: 80px;
            max-height: 220px;
        }

        /* In the detail view, both columns share the same capped height */
        .ode-card .ode-card-body {
            display: flex;
            align-items: stretch;
            max-height: 340px;
        }
        .ode-card .ode-card-body > .flex-grow-1 {
            display: flex;
            flex-direction: column;
            padding: 0.75rem;
            min-height: 0;
        }
        .ode-card .ode-card-body > .flex-grow-1 .eq-box {
            flex: 1;
            max-height: none;
            overflow-y: auto;
        }
        .ode-card .gc-panel {
            max-height: none;
            overflow-y: auto;
        }

        /* ── Method pills ── */
        .pill-0 { background:#dbeafe; color:#1d4ed8; }
        .pill-1 { background:#ede9fe; color:#6d28d9; }
        .pill-2 { background:#d1fae5; color:#065f46; }

        /* ── Dot indicators ── */
        .dot-btn {
            width: 8px; height: 8px;
            border-radius: 50%;
            border: none;
            background: #d1d5db;
            padding: 0;
            cursor: pointer;
            transition: background 0.12s, width 0.12s, height 0.12s;
        }
        .dot-btn.active-0 { background: #3b82f6; width: 9px; height: 9px; }
        .dot-btn.active-1 { background: #8b5cf6; width: 9px; height: 9px; }
        .dot-btn.active-2 { background: #10b981; width: 9px; height: 9px; }

        /* ── Legend dots ── */
        .legend-dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
        .dot-0 { background:#3b82f6; }
        .dot-1 { background:#8b5cf6; }
        .dot-2 { background:#10b981; }

        /* ── Carousel arrow buttons ── */
        .carousel-arrow {
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 1px solid #d1d5db;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; line-height: 1;
            cursor: pointer;
            color: #6b7280;
            transition: background 0.12s;
            flex-shrink: 0;
        }
        .carousel-arrow:hover:not(:disabled) { background: #f3f4f6; }
        .carousel-arrow:disabled { color: #d1d5db; border-color: #e5e7eb; cursor: default; }

        /* ── Grid ── */
        #ep-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        /* ── Search spinner ── */
        #search-spinner {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
<div class="d-flex">

    <!-- ══════════════ SIDEBAR ══════════════ -->
    <div id="sidebar">
        <!-- Header -->
        <div class="px-3 pt-3 pb-2 border-bottom">
            <h6 class="fw-bold text-dark mb-2">Epidemic Models</h6>
            <div class="position-relative">
                <input id="sidebar-search" type="text"
                       class="form-control form-control-sm"
                       placeholder="Search PMID, title, author…"
                       autocomplete="off">
                <span id="search-spinner"
                      class="spinner-border spinner-border-sm text-secondary"
                      style="display:none;width:.85rem;height:.85rem;"></span>
            </div>
        </div>

        <!-- List -->
        <div id="sidebar-list" class="overflow-auto flex-grow-1">
            <p class="text-muted small text-center mt-4 px-2">
                Type to search by title, author, PMID, or grounding concept.
            </p>
        </div>

        <!-- Legend -->
        <div class="px-3 py-2 border-top">
            <p class="text-uppercase text-muted fw-semibold mb-1" style="font-size:.65rem;letter-spacing:.05em">Methods</p>
            <div class="d-flex flex-column gap-1">
                <div class="d-flex align-items-center gap-2">
                    <span class="legend-dot dot-0"></span>
                    <span class="text-muted" style="font-size:.75rem">Marker Extraction</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="legend-dot dot-1"></span>
                    <span class="text-muted" style="font-size:.75rem">Multi-Agent Image Pipeline</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="legend-dot dot-2"></span>
                    <span class="text-muted" style="font-size:.75rem">MinerU CPU Text Extraction</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="legend-dot dot-2"></span>
                    <span class="text-muted" style="font-size:.75rem">XML Extraction</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ══════════════ MAIN AREA ══════════════ -->
    <div id="main-area">

        <!-- Grid view -->
        <div id="grid-view">
            <div id="ep-grid">
                <div class="text-center text-muted small py-5 w-100">
                    <span class="spinner-border spinner-border-sm me-1"></span> Loading…
                </div>
            </div>
        </div>

        <!-- Detail view (hidden until a paper is selected from sidebar) -->
        <div id="detail-view" style="display:none;">
            <button id="back-btn" class="btn btn-link btn-sm text-primary ps-0 mb-2">
                ← Back to all epidemics
            </button>
            <h5 id="detail-title" class="fw-bold text-dark mb-0"></h5>
            <p id="detail-meta" class="text-muted small mb-3"></p>
            <p id="detail-count" class="text-uppercase text-muted fw-semibold mb-3"
               style="font-size:.65rem;letter-spacing:.05em"></p>
            <div id="detail-cards" class="d-flex flex-column gap-3"></div>
        </div>

    </div>
</div>


<script>
/* ════════════════════════════════════════════════════════════
   State
════════════════════════════════════════════════════════════ */
let allEpidemics = [];   // full list from /explorer/api/pmids — used for grid only
let selectedPmid = null;
let searchDebounceTimer = null;
let currentSearchController = null;   // AbortController for in-flight search requests

/* ════════════════════════════════════════════════════════════
   KaTeX helper — renders all \[ … \] in a container
════════════════════════════════════════════════════════════ */
function renderKatex(container) {
    if (!window.renderMathInElement) {
        setTimeout(() => renderKatex(container), 150);
        return;
    }
    renderMathInElement(container, {
        delimiters: [
            { left: '\\[', right: '\\]', display: true  },
            { left: '\\(', right: '\\)', display: false },
        ],
        throwOnError: false,
    });
}

/* Wrap a LaTeX string for display-mode KaTeX */
function wrapLatex(lines) {
    return lines.map(l => `\\[ ${l} \\]`).join('\n');
}

/* ════════════════════════════════════════════════════════════
   Sidebar rendering
════════════════════════════════════════════════════════════ */
function renderSidebar(list) {
    const el = document.getElementById('sidebar-list');
    if (!list.length) {
        const q = document.getElementById('sidebar-search').value.trim();
        el.innerHTML = `<p class="text-muted small text-center mt-4 px-2">
            ${q ? 'No results found.' : 'Type to search by title, author, PMID, or grounding concept.'}
        </p>`;
        return;
    }
    el.innerHTML = list.map(ep => `
        <button class="sidebar-item ${selectedPmid === ep.pmid ? 'active' : ''}"
                data-pmid="${ep.pmid}">
            <div class="fw-medium text-dark" style="font-size:.78rem;line-height:1.3">
                ${escHtml(ep.title || ep.pmid)}
            </div>
            <div class="text-muted" style="font-size:.7rem;margin-top:2px">
                PMID ${ep.pmid}
                · ${ep.model_count} model${ep.model_count !== 1 ? 's' : ''}
            </div>
            <div class="text-muted" style="font-size:.7rem">
                ${escHtml(ep.author_list || '')}${ep.pub_year ? ' · ' + ep.pub_year : ''}
            </div>
        </button>
    `).join('');

    el.querySelectorAll('.sidebar-item').forEach(btn => {
        btn.addEventListener('click', () => openDetail(btn.dataset.pmid));
    });
}

/* ════════════════════════════════════════════════════════════
   Server-side search
   - Debounces 300 ms after the last keystroke
   - Cancels any in-flight request before issuing a new one
   - Returns empty list + hint text when query is blank
════════════════════════════════════════════════════════════ */
const searchSpinner = document.getElementById('search-spinner');

async function runSearch(q) {
    // Cancel previous in-flight fetch
    if (currentSearchController) {
        currentSearchController.abort();
    }

    if (!q) {
        renderSidebar([]);
        return;
    }

    currentSearchController = new AbortController();
    searchSpinner.style.display = 'inline-block';

    try {
        const url = `/explorer/api/search?q=${encodeURIComponent(q)}`;
        const resp = await fetch(url, { signal: currentSearchController.signal });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const results = await resp.json();
        renderSidebar(results);
    } catch (err) {
        if (err.name === 'AbortError') return;   // superseded by a newer request
        document.getElementById('sidebar-list').innerHTML =
            `<p class="text-danger small text-center mt-4 px-2">Search failed.</p>`;
        console.error('Search error:', err);
    } finally {
        searchSpinner.style.display = 'none';
        currentSearchController = null;
    }
}

document.getElementById('sidebar-search').addEventListener('input', function () {
    const q = this.value.trim();
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => runSearch(q), 300);
});

/* ════════════════════════════════════════════════════════════
   Grid view
════════════════════════════════════════════════════════════ */
function renderGrid() {
    const grid = document.getElementById('ep-grid');
    grid.innerHTML = allEpidemics.map(ep => buildSummaryCard(ep)).join('');

    allEpidemics.forEach(ep => {
        initSummaryCarousel(ep.pmid);
    });

    grid.querySelectorAll('.ep-summary-card').forEach(card => {
        card.addEventListener('click', () => openDetail(card.dataset.pmid));
    });
}

function buildSummaryCard(ep) {
    return `
    <div class="ep-summary-card" data-pmid="${ep.pmid}">
        <!-- Paper metadata -->
        <div class="px-3 py-2 border-bottom">
            <div class="fw-semibold text-dark" style="font-size:.8rem;line-height:1.35;
                 display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
                ${escHtml(ep.title || ep.pmid)}
            </div>
            <div class="text-muted" style="font-size:.72rem;margin-top:2px">
                ${escHtml(ep.author_list || '')}${ep.pub_year ? ' · ' + ep.pub_year : ''} · PMID ${ep.pmid}
            </div>
        </div>

        <!-- Carousel -->
        <div class="px-3 py-2" id="carousel-${ep.pmid}">
            <div class="text-center text-muted small py-3">
                <span class="spinner-border spinner-border-sm"></span>
            </div>
        </div>
    </div>`;
}

/* Fetch models for one card and initialise its carousel */
async function initSummaryCarousel(pmid) {
    const container = document.getElementById(`carousel-${pmid}`);
    if (!container) return;

    try {
        const resp   = await fetch(`/explorer/api/pmids/${encodeURIComponent(pmid)}/models`);
        const models = await resp.json();

        if (!models.length) {
            container.innerHTML = '<p class="text-muted small text-center py-2">No models stored.</p>';
            return;
        }

        let idx = 0;

        function renderCarousel() {
            const m     = models[idx];
            const total = models.length;

            container.innerHTML = `
                <!-- Model nav row -->
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <button class="carousel-arrow" id="prev-${pmid}" ${idx === 0 ? 'disabled' : ''}>‹</button>

                    <div class="d-flex flex-column align-items-center gap-1 flex-grow-1 mx-2">
                        <span class="badge rounded-pill pill-${m.extraction_method}"
                              style="font-size:.7rem;font-weight:600">
                            ${escHtml(m.method_label)}
                        </span>
                        <div class="d-flex gap-1 align-items-center">
                            ${models.map((mm, i) => `
                                <button class="dot-btn ${i === idx ? 'active-' + mm.extraction_method : ''}"
                                        data-dot-idx="${i}"></button>
                            `).join('')}
                        </div>
                        <span class="text-muted" style="font-size:.7rem">
                            Model ${idx + 1} of ${total}
                        </span>
                    </div>

                    <button class="carousel-arrow" id="next-${pmid}" ${idx === total - 1 ? 'disabled' : ''}>›</button>
                </div>

                <!-- Equation box -->
                <div class="eq-box" id="eqbox-${pmid}">
                    ${wrapLatex(m.latex)}
                </div>
            `;

            renderKatex(document.getElementById(`eqbox-${pmid}`));

            container.querySelector(`#prev-${pmid}`).addEventListener('click', e => {
                e.stopPropagation(); idx = Math.max(idx - 1, 0); renderCarousel();
            });
            container.querySelector(`#next-${pmid}`).addEventListener('click', e => {
                e.stopPropagation(); idx = Math.min(idx + 1, total - 1); renderCarousel();
            });

            container.querySelectorAll('.dot-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    idx = parseInt(btn.dataset.dotIdx);
                    renderCarousel();
                });
            });
        }

        renderCarousel();

    } catch (err) {
        container.innerHTML = `<p class="text-danger small text-center py-2">Failed to load models.</p>`;
        console.error(err);
    }
}

/* ════════════════════════════════════════════════════════════
   Detail view
════════════════════════════════════════════════════════════ */
async function openDetail(pmid) {
    selectedPmid = pmid;
    const ep = allEpidemics.find(e => e.pmid === pmid);

    document.querySelectorAll('.sidebar-item').forEach(b => {
        b.classList.toggle('active', b.dataset.pmid === pmid);
    });

    document.getElementById('grid-view').style.display   = 'none';
    document.getElementById('detail-view').style.display = 'block';

    document.getElementById('detail-title').textContent = ep?.title || pmid;
    document.getElementById('detail-meta').textContent  =
        [ep?.author_list, ep?.pub_year, `PMID ${pmid}`].filter(Boolean).join(' · ');

    const cardsEl = document.getElementById('detail-cards');
    cardsEl.innerHTML = `
        <div class="text-center text-muted py-5">
            <span class="spinner-border spinner-border-sm me-1"></span> Loading models…
        </div>`;

    try {
        const resp   = await fetch(`/explorer/api/pmids/${encodeURIComponent(pmid)}/models`);
        const models = await resp.json();

        document.getElementById('detail-count').textContent =
            `${models.length} extraction result${models.length !== 1 ? 's' : ''}`;

        if (!models.length) {
            cardsEl.innerHTML = '<p class="text-muted">No models stored for this PMID.</p>';
            return;
        }

        cardsEl.innerHTML = models.map(m => `
            <div class="ode-card">
                <div class="d-flex align-items-center justify-content-between px-3 py-2 border-bottom bg-light">
                    <span class="badge rounded-pill pill-${m.extraction_method}"
                          style="font-size:.75rem;font-weight:600">
                        ${escHtml(m.method_label)}
                    </span>
                    <span class="text-muted small">${m.latex.length} equation${m.latex.length !== 1 ? 's' : ''}</span>
                </div>
                <div class="ode-card-body">
                    <div class="flex-grow-1">
                        <div class="eq-box" id="detail-eq-${m.id}">
                            ${wrapLatex(m.latex)}
                        </div>
                    </div>
                    <div class="gc-panel">
                        <p class="text-uppercase text-muted fw-semibold mb-2"
                           style="font-size:.62rem;letter-spacing:.05em">Grounded Concepts</p>
                        ${buildGroundingPanel(m.grounded_concepts)}
                    </div>
                </div>
            </div>
        `).join('');

        models.forEach(m => {
            const box = document.getElementById(`detail-eq-${m.id}`);
            if (box) renderKatex(box);
        });

    } catch (err) {
        cardsEl.innerHTML = `<div class="alert alert-danger">Failed to load models: ${err.message}</div>`;
    }
}

/* ════════════════════════════════════════════════════════════
   Back button
════════════════════════════════════════════════════════════ */
document.getElementById('back-btn').addEventListener('click', () => {
    selectedPmid = null;
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('grid-view').style.display   = 'block';
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
});

/* ════════════════════════════════════════════════════════════
   Bootstrap
════════════════════════════════════════════════════════════ */
async function init() {
    try {
        const resp   = await fetch('/explorer/api/pmids');
        allEpidemics = await resp.json();
        renderSidebar([]);   // sidebar starts empty — search populates it
        renderGrid();
    } catch (err) {
        document.getElementById('sidebar-list').innerHTML =
            `<p class="text-danger small text-center mt-4">Failed to load.</p>`;
        document.getElementById('ep-grid').innerHTML =
            `<div class="alert alert-danger">Failed to load epidemics: ${err.message}</div>`;
    }
}

/* ════════════════════════════════════════════════════════════
   Build grounding concepts panel HTML
════════════════════════════════════════════════════════════ */
function buildGroundingPanel(concepts) {
    if (!concepts || !Object.keys(concepts).length) {
        return '<p class="text-muted" style="font-size:.72rem">No grounding data.</p>';
    }

    return Object.entries(concepts).map(([varName, data]) => {
        const ids = data.identifiers
            ? Object.entries(data.identifiers)
                .map(([k, v]) => `${k}:${v}`)
                .join(', ')
            : '';

        const ctxRows = data.context
            ? Object.entries(data.context)
                .map(([k, v]) => `
                    <div class="gc-context-row">
                        <span class="gc-context-key">${escHtml(k)}:</span>
                        <span class="gc-context-value"> ${escHtml(String(v))}</span>
                    </div>`)
                .join('')
            : '';

        return `
            <div class="gc-var-row">
                <div>
                    <span class="gc-var-name">${escHtml(varName)}</span>
                    ${ids ? `<span class="gc-ontology">${escHtml(ids)}</span>` : ''}
                </div>
                ${ctxRows}
            </div>`;
    }).join('');
}

/* ════════════════════════════════════════════════════════════
   Utility
════════════════════════════════════════════════════════════ */
function escHtml(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

init();
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
