<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epidemic Model Explorer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.15/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.15/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.15/dist/contrib/auto-render.min.js"></script>

    <style>
        /* ── Top banner ── */
        #top-banner {
            height: 48px;
            background: #1e3a5f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            flex-shrink: 0;
        }
        #top-banner .banner-left,
        #top-banner .banner-right {
            display: flex;
            align-items: center;
        }
        #top-banner .banner-right { gap: 1rem; }
        #top-banner .banner-logo {
            height: 28px;
            width: auto;
            vertical-align: middle;
        }
        #top-banner .github-link {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #93c5fd;
            font-size: .8rem;
            text-decoration: none;
            transition: color 0.12s;
        }
        #top-banner .github-link:hover { color: #fff; }
        #top-banner .github-link i { font-size: 1.1rem; }

        /* ── Bottom footer ── */
        #bottom-footer {
            height: 36px;
            background: #1e3a5f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.25rem;
            flex-shrink: 0;
        }
        #bottom-footer .footer-text {
            font-size: .72rem;
            color: #93c5fd;
        }
        #bottom-footer .footer-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        #bottom-footer .footer-link {
            color: #93c5fd;
            font-size: .72rem;
            text-decoration: none;
            transition: color 0.12s;
        }
        #bottom-footer .footer-link:hover { color: #fff; }

        /* ── Layout ── */
        html, body { height: 100%; overflow: hidden; margin: 0; }
        #app-shell { display: flex; flex-direction: column; height: 100vh; }
        #content-row { display: flex; flex: 1; min-height: 0; }

        #sidebar {
            width: 240px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #fff;
            border-right: 1px solid #e5e7eb;
        }

        #main-area {
            flex: 1;
            overflow-y: auto;
            height: 100%;
            padding: 1.25rem;
            background: #f3f4f6;
        }

        /* ── Sidebar list items ── */
        .sidebar-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.6rem 0.75rem;
            border: none;
            border-bottom: 1px solid #f1f5f9;
            background: transparent;
            cursor: pointer;
            transition: background 0.12s;
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover  { background: #eff6ff; }
        .sidebar-item.active { background: #eff6ff; border-left-color: #3b82f6; }

        /* ── Summary cards (grid) ── */
        .ep-summary-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: box-shadow 0.15s, border-color 0.15s;
            overflow: hidden;
        }
        .ep-summary-card:hover        { box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: #93c5fd; }
        .ep-summary-card.highlighted  { border-color: #3b82f6; box-shadow: 0 0 0 3px #bfdbfe; }
        a.pmid-link { color: inherit; text-decoration: none; }
        a.pmid-link:hover { text-decoration: underline; color: #2563eb; }
        .text-muted a.pmid-link { color: #2563eb; }
        .gc-ontology a.curie-link,
        .gc-context-value a.curie-link {
            color: #6366f1;
            text-decoration: none;
        }
        .gc-ontology a.curie-link:hover,
        .gc-context-value a.curie-link:hover {
            text-decoration: underline;
            color: #4338ca;
        }

        /* ── Detail / ODE cards ── */
        .ode-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            overflow: hidden;
        }

        /* ── Grounding concepts panel ── */
        .gc-panel {
            width: 260px;
            flex-shrink: 0;
            border-left: 1px solid #e5e7eb;
            overflow-y: auto;
            max-height: 340px;
            padding: 0.75rem;
            background: #fafafa;
        }
        .gc-var-row {
            padding: 0.4rem 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .gc-var-row:last-child { border-bottom: none; }
        .gc-var-name {
            font-size: .78rem;
            font-weight: 700;
            color: #1e3a5f;
            font-family: monospace;
        }
        .gc-ontology {
            font-size: .7rem;
            color: #6366f1;
            font-family: monospace;
            margin-left: 0.25rem;
        }
        .gc-context-row {
            font-size: .68rem;
            color: #6b7280;
            margin-top: 1px;
            padding-left: 0.5rem;
        }
        .gc-context-key   { color: #9ca3af; }
        .gc-context-value { color: #374151; }

        /* ── Equation box ── */
        .eq-box {
            background: #f9fafb;
            border: 1px solid #f1f5f9;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            overflow-y: auto;
            min-height: 80px;
            max-height: 220px;
        }

        /* In the detail view, both columns share the same capped height */
        .ode-card .ode-card-body {
            display: flex;
            align-items: stretch;
            max-height: 340px;
        }
        .ode-card .ode-card-body > .flex-grow-1 {
            display: flex;
            flex-direction: column;
            padding: 0.75rem;
            min-height: 0;
        }
        .ode-card .ode-card-body > .flex-grow-1 .eq-box {
            flex: 1;
            max-height: none;
            overflow-y: auto;
        }
        .ode-card .gc-panel {
            max-height: none;
            overflow-y: auto;
        }

        /* ── Method pills ── */
        .pill-marker { background:#dbeafe; color:#1d4ed8; }
        .pill-mineru_image { background:#ede9fe; color:#6d28d9; }
        .pill-mineru_text { background:#d1fae5; color:#065f46; }
        .pill-xml_extraction { background:#fef3c7; color:#92400e; }

        /* ── Grid ── */
        #ep-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        /* ── Search spinner ── */
        #search-spinner {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
        }

        /* ── Download buttons ── */
        .dl-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.6rem;
            font-size: .72rem;
            font-weight: 600;
            border-radius: 0.4rem;
            border: 1px solid;
            background: transparent;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
            text-decoration: none;
            white-space: nowrap;
        }
        .dl-btn-json   { border-color: #93c5fd; color: #1d4ed8; }
        .dl-btn-json:hover   { background: #dbeafe; }
        .dl-btn-sbml   { border-color: #6ee7b7; color: #065f46; }
        .dl-btn-sbml:hover   { background: #d1fae5; }
        .dl-btn-sympy  { border-color: #c4b5fd; color: #6d28d9; }
        .dl-btn-sympy:hover  { background: #ede9fe; }
        .dl-btn.downloading { opacity: .6; pointer-events: none; }

        /* ── Summary card eq box — scrollable ── */
        .summary-eq-box {
            background: #f9fafb;
            border: 1px solid #f1f5f9;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            overflow-y: auto;
            max-height: 200px;
            cursor: default;
        }
    </style>
</head>
<body>
<div id="app-shell">

    <!-- ══════════════ TOP BANNER ══════════════ -->
    <div id="top-banner">
        <div class="banner-left">
            <img src="/static/mira_logo_inverted.png" alt="MIRA" class="banner-logo mira-logo">
        </div>
        <div class="banner-right">
            <a class="github-link" href="https://github.com/gyorilab/miradb" target="_blank" rel="noopener">
                <i class="bi bi-github"></i>
                View on GitHub
            </a>
            <img src="/static/gyorilab_logo.png" alt="Gyorilab" class="banner-logo lab-logo">
        </div>
    </div>

    <div id="content-row">

        <!-- ══════════════ SIDEBAR ══════════════ -->
        <div id="sidebar">
            <!-- Header -->
            <div class="px-3 pt-3 pb-2 border-bottom">
                <h6 class="fw-bold text-dark mb-2">Model search</h6>
                <div class="position-relative">
                    <input id="sidebar-search" type="text"
                           class="form-control form-control-sm"
                           placeholder="Search PMID, title, author…"
                           autocomplete="off">
                    <span id="search-spinner"
                          class="spinner-border spinner-border-sm text-secondary"
                          style="display:none;width:.85rem;height:.85rem;"></span>
                </div>
            </div>

            <!-- List -->
            <div id="sidebar-list" class="overflow-auto flex-grow-1">
                <p class="text-muted small text-center mt-4 px-2">
                    Type to search by title, author, PMID, or grounding concept.
                </p>
            </div>
        </div>

        <!-- ══════════════ MAIN AREA ══════════════ -->
        <div id="main-area">

            <!-- Grid view -->
            <div id="grid-view">
                <div id="ep-grid">
                    <div class="text-center text-muted small py-5 w-100">
                        <span class="spinner-border spinner-border-sm me-1"></span> Loading&hellip;
                    </div>
                </div>
            </div>

            <!-- Detail view -->
            <div id="detail-view" style="display:none;">
                <button id="back-btn" class="btn btn-link btn-sm text-primary ps-0 mb-2">
                    &larr; Back to all models
                </button>
                <h5 id="detail-title" class="fw-bold text-dark mb-0"></h5>
                <p id="detail-meta" class="text-muted small mb-3"></p>
                <p id="detail-count" class="text-uppercase text-muted fw-semibold mb-3"
                   style="font-size:.65rem;letter-spacing:.05em"></p>
                <div id="detail-cards" class="d-flex flex-column gap-3"></div>
            </div>

        </div>
    </div><!-- /#content-row -->

    <!-- ══════════════ FOOTER ══════════════ -->
    <footer id="bottom-footer">
        <span class="footer-text">MIRA-DB &middot; <a class="footer-link" href="https://gyorilab.github.io/" target="_blank" rel="noopener">Gyori Lab</a> &middot; Funded by grant HR00112220036 under the DARPA ASKEM program.</span>
        <div class="footer-links">
            <a class="footer-link" href="https://github.com/gyorilab/mira" target="_blank" rel="noopener">MIRA on GitHub</a>
            <a class="footer-link" href="https://miramodel.readthedocs.io" target="_blank" rel="noopener">MIRA Documentation</a>
            <a class="footer-link" href="https://github.com/gyorilab/miradb" target="_blank" rel="noopener">MIRA-DB on GitHub</a>
        </div>
    </footer>

</div><!-- /#app-shell -->


<script>
/* ════════════════════════════════════════════════════════════
   State
════════════════════════════════════════════════════════════ */
let allEpidemics = [];
let selectedPmid = null;
let searchDebounceTimer = null;
let currentSearchController = null;

const SUMMARY_MAX_CONCURRENT = 8;
const SUMMARY_ROOT_MARGIN = '200px';

let summaryObserver = null;
const summaryScheduled = new Set();
const summaryQueue = [];
const summaryPendingCards = new Map();
let summaryInFlight = 0;

/* ════════════════════════════════════════════════════════════
   Extraction method priority for summary cards (from extraction_methods.json)
════════════════════════════════════════════════════════════ */
const METHOD_PRIORITY = {{ extraction_method_priority | tojson }};

function pickBestModel(models) {
    if (!models || !models.length) return null;
    for (const preferred of METHOD_PRIORITY) {
        const found = models.find(m => m.extraction_method === preferred);
        if (found) return found;
    }
    return models[0];
}

/* ════════════════════════════════════════════════════════════
   KaTeX helper
════════════════════════════════════════════════════════════ */
function renderKatex(container) {
    if (!window.renderMathInElement) {
        setTimeout(() => renderKatex(container), 150);
        return;
    }
    renderMathInElement(container, {
        delimiters: [
            { left: '\\[', right: '\\]', display: true  },
            { left: '\\(', right: '\\)', display: false },
        ],
        throwOnError: false,
    });
}

function wrapLatex(lines) {
    return lines.map(l => `\\[ ${l} \\]`).join('\n');
}

/* ════════════════════════════════════════════════════════════
   Sidebar rendering
════════════════════════════════════════════════════════════ */
function renderSidebar(list) {
    const el = document.getElementById('sidebar-list');
    if (!list.length) {
        const q = document.getElementById('sidebar-search').value.trim();
        el.innerHTML = `<p class="text-muted small text-center mt-4 px-2">
            ${q ? 'No results found.' : 'Type to search by title, author, PMID, or grounding concept.'}
        </p>`;
        return;
    }
    el.innerHTML = list.map(ep => `
        <button class="sidebar-item ${selectedPmid === ep.pmid ? 'active' : ''}"
                data-pmid="${ep.pmid}">
            <div class="fw-medium text-dark" style="font-size:.78rem;line-height:1.3">
                ${titleOrPmidHtml(ep, true)}
            </div>
            <div class="text-muted" style="font-size:.7rem;margin-top:2px">
                ${pmidLabelHtml(ep.pmid, true)}
                ${ep.model_count ? `&middot; ${ep.model_count} extraction${ep.model_count !== 1 ? 's' : ''}` : ''}
            </div>
            <div class="text-muted" style="font-size:.7rem">
                ${escHtml(ep.author_list || '')}${ep.pub_year ? ' &middot; ' + ep.pub_year : ''}
            </div>
        </button>
    `).join('');

    el.querySelectorAll('.sidebar-item').forEach(btn => {
        btn.addEventListener('click', () => openDetail(btn.dataset.pmid));
    });
}

/* ════════════════════════════════════════════════════════════
   Server-side search
════════════════════════════════════════════════════════════ */
const searchSpinner = document.getElementById('search-spinner');

async function runSearch(q) {
    if (currentSearchController) currentSearchController.abort();

    if (!q) {
        renderSidebar([]);
        return;
    }

    currentSearchController = new AbortController();
    searchSpinner.style.display = 'inline-block';

    try {
        const url = `/explorer/api/search?q=${encodeURIComponent(q)}`;
        const resp = await fetch(url, { signal: currentSearchController.signal });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const results = await resp.json();
        renderSidebar(results);
    } catch (err) {
        if (err.name === 'AbortError') return;
        document.getElementById('sidebar-list').innerHTML =
            `<p class="text-danger small text-center mt-4 px-2">Search failed.</p>`;
        console.error('Search error:', err);
    } finally {
        searchSpinner.style.display = 'none';
        currentSearchController = null;
    }
}

document.getElementById('sidebar-search').addEventListener('input', function () {
    const q = this.value.trim();
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(() => runSearch(q), 300);
});

/* ════════════════════════════════════════════════════════════
   Grid summary load (lazy + concurrency cap)
════════════════════════════════════════════════════════════ */
function scheduleSummaryLoad(pmid, card) {
    if (summaryScheduled.has(pmid)) return;
    summaryScheduled.add(pmid);
    if (card) summaryPendingCards.set(pmid, card);
    summaryQueue.push(pmid);
    drainSummaryQueue();
}

async function drainSummaryQueue() {
    while (summaryInFlight < SUMMARY_MAX_CONCURRENT && summaryQueue.length) {
        const pmid = summaryQueue.shift();
        summaryInFlight++;
        let ok = false;
        try {
            ok = await loadSummaryCard(pmid);
        } finally {
            summaryInFlight--;
            if (ok) {
                const card = summaryPendingCards.get(pmid);
                if (card && summaryObserver) summaryObserver.unobserve(card);
                summaryPendingCards.delete(pmid);
            } else {
                summaryScheduled.delete(pmid);
                summaryPendingCards.delete(pmid);
            }
            drainSummaryQueue();
        }
    }
}

function teardownLazySummaryCards() {
    if (summaryObserver) {
        summaryObserver.disconnect();
        summaryObserver = null;
    }
    summaryQueue.length = 0;
    summaryScheduled.clear();
    summaryPendingCards.clear();
}

function setupLazySummaryCards(grid) {
    teardownLazySummaryCards();

    const scrollRoot = document.getElementById('main-area');
    if (!scrollRoot) return;

    summaryObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
            if (!entry.isIntersecting) continue;
            const pmid = entry.target.dataset.pmid;
            if (pmid) scheduleSummaryLoad(pmid, entry.target);
        }
    }, {
        root: scrollRoot,
        rootMargin: SUMMARY_ROOT_MARGIN,
        threshold: 0,
    });

    grid.querySelectorAll('.ep-summary-card').forEach(card => {
        summaryObserver.observe(card);
    });
}

/* ════════════════════════════════════════════════════════════
   Grid view
════════════════════════════════════════════════════════════ */
function renderGrid() {
    const grid = document.getElementById('ep-grid');
    grid.innerHTML = allEpidemics.map(ep => buildSummaryCard(ep)).join('');

    setupLazySummaryCards(grid);

    grid.querySelectorAll('.ep-summary-card').forEach(card => {
        card.addEventListener('click', () => openDetail(card.dataset.pmid));
    });
}

function buildSummaryCard(ep) {
    return `
    <div class="ep-summary-card" data-pmid="${ep.pmid}">
        <div class="px-3 py-2 border-bottom">
            <div class="fw-semibold text-dark" style="font-size:.8rem;line-height:1.35;
                 display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">
                ${escHtml(ep.title || ep.pmid)}
            </div>
            <div class="text-muted" style="font-size:.72rem;margin-top:2px">
                ${escHtml(ep.author_list || '')}${ep.pub_year ? ' &middot; ' + ep.pub_year : ''} &middot; ${pmidLabelHtml(ep.pmid, true)}

            </div>
        </div>
        <div class="px-3 py-2" id="card-body-${ep.pmid}">
            <div class="text-center text-muted small py-3">
                <span class="spinner-border spinner-border-sm"></span>
            </div>
        </div>
    </div>`;
}

/* Fetch models, pick the best one by priority, render a single static card */
async function loadSummaryCard(pmid) {
    const container = document.getElementById(`card-body-${pmid}`);
    if (!container) return false;

    try {
        const resp   = await fetch(`/explorer/api/pmids/${encodeURIComponent(pmid)}/models`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const models = await resp.json();

        if (!models.length) {
            container.innerHTML = '<p class="text-muted small text-center py-2">No models stored.</p>';
            return true;
        }

        const m = pickBestModel(models);

        container.innerHTML = `
            <div class="summary-eq-box" id="eqbox-${pmid}"
                 onclick="event.stopPropagation()">
                ${wrapLatex(m.latex)}
            </div>
        `;

        renderKatex(document.getElementById(`eqbox-${pmid}`));
        return true;

    } catch (err) {
        container.innerHTML = `<p class="text-danger small text-center py-2">Failed to load models.</p>`;
        console.error(err);
        return false;
    }
}

/* ════════════════════════════════════════════════════════════
   Detail view
════════════════════════════════════════════════════════════ */
async function openDetail(pmid) {
    selectedPmid = pmid;
    const ep = allEpidemics.find(e => e.pmid === pmid);

    document.querySelectorAll('.sidebar-item').forEach(b => {
        b.classList.toggle('active', b.dataset.pmid === pmid);
    });

    document.getElementById('grid-view').style.display   = 'none';
    document.getElementById('detail-view').style.display = 'block';

    document.getElementById('detail-title').textContent = ep?.title || pmid;
    document.getElementById('detail-meta').innerHTML =
        [
            ep?.author_list ? escHtml(ep.author_list) : '',
            ep?.pub_year ? escHtml(String(ep.pub_year)) : '',
            pmidLabelHtml(pmid),
        ].filter(Boolean).join(' · ');

    const cardsEl = document.getElementById('detail-cards');
    cardsEl.innerHTML = `
        <div class="text-center text-muted py-5">
            <span class="spinner-border spinner-border-sm me-1"></span> Loading models&hellip;
        </div>`;

    try {
        const resp   = await fetch(`/explorer/api/pmids/${encodeURIComponent(pmid)}/models`);
        const models = await resp.json();

        document.getElementById('detail-count').textContent =
            `${models.length} extraction result${models.length !== 1 ? 's' : ''}`;

        if (!models.length) {
            cardsEl.innerHTML = `<p class="text-muted">No models stored for this ${pmidLabelHtml(pmid)}.</p>`;
            return;
        }

        cardsEl.innerHTML = models.map(m => `
            <div class="ode-card">
                <div class="d-flex align-items-center justify-content-between px-3 py-2 border-bottom bg-light flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-2">
                        <span class="badge rounded-pill pill-${m.extraction_method}"
                              style="font-size:.75rem;font-weight:600">
                            ${escHtml(m.method_label)}
                        </span>
                        <span class="text-muted small">${m.latex.length} equation${m.latex.length !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="dl-btn dl-btn-json"
                                data-model-id="${m.id}" data-format="json"
                                title="MIRA TemplateModel JSON">
                            <i class="bi bi-filetype-json"></i> JSON
                        </button>
                        <button class="dl-btn dl-btn-sbml"
                                data-model-id="${m.id}" data-format="sbml"
                                title="SBML">
                            <i class="bi bi-file-earmark-code"></i> SBML
                        </button>
                        <button class="dl-btn dl-btn-sympy"
                                data-model-id="${m.id}" data-format="sympy"
                                title="ODEs as SymPy (MIRA OdeModel)">
                            <i class="bi bi-file-earmark-text"></i> SymPy
                        </button>
                    </div>
                </div>
                <div class="ode-card-body">
                    <div class="flex-grow-1">
                        <div class="eq-box" id="detail-eq-${m.id}">
                            ${wrapLatex(m.latex)}
                        </div>
                    </div>
                    <div class="gc-panel">
                        <p class="text-uppercase text-muted fw-semibold mb-2"
                           style="font-size:.62rem;letter-spacing:.05em">Grounded Concepts</p>
                        ${buildGroundingPanel(m.grounded_concepts)}
                    </div>
                </div>
            </div>
        `).join('');

        models.forEach(m => {
            const box = document.getElementById(`detail-eq-${m.id}`);
            if (box) renderKatex(box);
        });

        // Wire up download buttons
        cardsEl.querySelectorAll('.dl-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                triggerDownload(btn.dataset.modelId, btn.dataset.format, btn);
            });
        });

    } catch (err) {
        cardsEl.innerHTML = `<div class="alert alert-danger">Failed to load models: ${err.message}</div>`;
    }
}

/* ════════════════════════════════════════════════════════════
   Download handler
════════════════════════════════════════════════════════════ */
const FORMAT_META = {
    json:  { ext: 'json',  mime: 'application/json',  label: 'JSON'  },
    sbml:  { ext: 'xml',   mime: 'application/xml',   label: 'SBML'  },
    sympy: { ext: 'py',    mime: 'text/plain',        label: 'SymPy' },
};

async function triggerDownload(modelId, format, btn) {
    const meta = FORMAT_META[format];
    btn.classList.add('downloading');
    const originalHTML = btn.innerHTML;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm" style="width:.7rem;height:.7rem;"></span> ${meta.label}`;

    try {
        const resp = await fetch(`/explorer/api/models/${encodeURIComponent(modelId)}/download/${format}`);
        if (!resp.ok) throw new Error(`Server returned ${resp.status}`);

        const blob = await resp.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `model_${modelId}.${meta.ext}`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    } catch (err) {
        alert(`Download failed: ${err.message}`);
        console.error('Download error:', err);
    } finally {
        btn.innerHTML = originalHTML;
        btn.classList.remove('downloading');
    }
}

}

/* ════════════════════════════════════════════════════════════
   Grounding concepts panel
════════════════════════════════════════════════════════════ */
function buildGroundingPanel(concepts) {
    if (!concepts || !Object.keys(concepts).length) {
        return '<p class="text-muted" style="font-size:.72rem">No grounding data.</p>';
    }
    return Object.entries(concepts).map(([varName, data]) => {
        const ids = data.identifiers
            ? Object.entries(data.identifiers)
                .map(([k, v]) => curieLinkHtml(`${k}:${v}`, true))
                .join(', ')
            : '';
        const ctxRows = data.context
            ? Object.entries(data.context).map(([k, v]) => `
                    <div class="gc-context-row">
                        <span class="gc-context-key">${escHtml(k)}:</span>
                        <span class="gc-context-value"> ${formatContextValue(v)}</span>
                    </div>`).join('')
            : '';
        return `
            <div class="gc-var-row">
                <div>
                    <span class="gc-var-name">${escHtml(varName)}</span>
                    ${ids ? `<span class="gc-ontology">${ids}</span>` : ''}
                </div>
                ${ctxRows}
            </div>`;
    }).join('');
}

/* ════════════════════════════════════════════════════════════
   Utility
════════════════════════════════════════════════════════════ */
function escHtml(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const CURIE_RE = /^[a-zA-Z][\w.-]*:[^\s,;]+$/;

function isCurie(str) {
    return CURIE_RE.test(String(str).trim());
}

function bioregistryUrl(curie) {
    return `https://bioregistry.io/${curie}`;
}

function curieLinkHtml(curie, stopClick) {
    const stop = stopClick ? ' onclick="event.stopPropagation()"' : '';
    return `<a class="curie-link" href="${bioregistryUrl(curie)}" target="_blank" rel="noopener noreferrer"${stop}>${escHtml(curie)}</a>`;
}

function formatContextValue(v) {
    const s = String(v).trim();
    return isCurie(s) ? curieLinkHtml(s, true) : escHtml(String(v));
}

function pubmedUrl(pmid) {
    return `https://bioregistry.io/pubmed:${encodeURIComponent(pmid)}`;
}

function pmidLinkHtml(pmid, stopClick) {
    const stop = stopClick ? ' onclick="event.stopPropagation()"' : '';
    return `<a class="pmid-link" href="${pubmedUrl(pmid)}" target="_blank" rel="noopener noreferrer"${stop}>${escHtml(pmid)}</a>`;
}

function pmidLabelHtml(pmid, stopClick) {
    return `PMID ${pmidLinkHtml(pmid, stopClick)}`;
}

function titleOrPmidHtml(ep, stopClick) {
    return ep.title ? escHtml(ep.title) : pmidLinkHtml(ep.pmid, stopClick);
}

init();
